<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O akci</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link id="gfonts" rel="stylesheet" href="">
<style>
  :root {
    /* Theme-overridable variables (set by Visual Editor or by API-loaded theme) —
       kept identical to registration.html so both pages always match. */
    --color-primary: #0e0d0b;
    --color-accent: #b8924a;
    --color-surface: #f7f4ef;
    --color-muted: #8a8070;
    --color-border: #d6cfc3;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'Cormorant Garamond', Georgia, serif;
    --font-mono: 'Geist Mono', monospace;
    --title-size: clamp(42px, 7vw, 72px);
    --title-weight: 300;
    --body-size: 18px;
    --line-height: 1.6;
    --page-padding: 80px 40px 120px;
    --max-width: 960px;
    --radius: 2px;
    --noise-opacity: 0.6;
    --noise-display: block;
    --anim-header: fadeUp 0.8s ease both;
    --anim-form: fadeUp 0.8s 0.15s ease both;
    --logo-display: none;
    --logo-height: 40px;
    --logo-position: center;
    --hero-display: none;
    --hero-height: 320px;
    --hero-fit: cover;
    --hero-overlay: 0.3;
    --bg: #f7f4ef;

    --ink: var(--color-primary);
    --paper: var(--color-surface);
    --cream: #ede9e1;
    --warm: var(--color-border);
    --gold: var(--color-accent);
    --gold-light: #e8d9bc;
    --muted: var(--color-muted);
    --red: #9b3a2a;
    --green: #2d5a3d;
    --green-bg: #eaf2ec;
    --card-text: var(--ink);
    --card-muted: var(--muted);
  }
</style>
<style id="themeStyle"></style>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg, var(--paper));
    color: var(--ink);
    min-height: 100vh;
    font-size: var(--body-size);
    font-weight: 300;
    line-height: var(--line-height);
    overflow-x: hidden;
  }

  /* NOISE TEXTURE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    display: var(--noise-display, block);
    opacity: var(--noise-opacity, 0.6);
  }

  a { color: inherit; }

  /* LAYOUT */
  .page-wrap {
    position: relative;
    z-index: 1;
    max-width: var(--max-width, 960px);
    margin: 0 auto;
    padding: var(--page-padding, 80px 40px 120px);
  }

  /* LOGO */
  .site-logo-wrap {
    display: var(--logo-display, none);
    justify-content: var(--logo-position, center);
    margin-bottom: 32px;
  }
  .site-logo-wrap img { height: var(--logo-height, 40px); object-fit: contain; }

  /* LOADING / ERROR */
  #loadingScreen, #loadErrorScreen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 60vh; gap: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 32px; height: 32px; border: 2px solid var(--gold-light);
    border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  .loading-label {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
  }
  #loadErrorScreen { text-align: center; padding: 0 24px; }
  .load-error-message { font-size: 16px; color: var(--ink); max-width: 420px; line-height: 1.5; }

  /* HERO */
  .hero {
    margin-bottom: 56px;
    animation: var(--anim-header, fadeUp 0.8s ease both);
  }
  .hero-eyebrow {
    font-family: var(--font-mono); font-size: 11px; font-weight: 400;
    letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold);
    margin-bottom: 20px; display: flex; align-items: center; gap: 14px;
  }
  .hero-eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--gold-light); max-width: 80px; }
  .hero-title {
    font-family: var(--font-display); font-size: var(--title-size); font-weight: var(--title-weight);
    line-height: 1.05; letter-spacing: -0.01em; margin-bottom: 20px; color: var(--ink);
  }
  .hero-title em { font-style: italic; color: var(--gold); }
  .hero-meta { display: flex; flex-wrap: wrap; gap: 32px; margin-bottom: 28px; }
  .meta-item { display: flex; flex-direction: column; gap: 4px; }
  .meta-label {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
  }
  .meta-value { font-size: 17px; color: var(--ink); }
  .hero-intro { font-size: 18px; line-height: 1.7; color: var(--ink); max-width: 640px; margin-bottom: 36px; }

  .hero-video-wrap {
    position: relative; width: 100%; padding-top: 56.25%;
    background: var(--cream); border-radius: var(--radius); overflow: hidden; margin-bottom: 8px;
  }
  .hero-video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

  .cta-row { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 32px; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 17px; font-weight: 400;
    letter-spacing: 0.03em; padding: 14px 36px; border-radius: var(--radius);
    cursor: pointer; text-decoration: none; transition: opacity 0.2s; border: none;
  }
  .btn-primary { background: var(--btn-bg, var(--color-primary)); color: var(--btn-text, #ffffff); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary { background: transparent; color: var(--ink); border: 1px solid var(--warm); }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

  /* STICKY NAV (dealer/brand jump links) */
  .section-nav-wrap { position: sticky; top: 0; z-index: 10; margin: 0 -40px 56px; }
  .section-nav {
    display: flex; gap: 4px; overflow-x: auto; padding: 14px 40px;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--warm);
    scrollbar-width: thin;
  }
  .section-nav-link {
    flex-shrink: 0; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); padding: 8px 16px; border-radius: var(--radius);
    cursor: pointer; transition: all 0.2s; white-space: nowrap; text-decoration: none;
  }
  .section-nav-link:hover { color: var(--ink); background: var(--cream); }

  /* DEALER / BRAND SECTIONS */
  .dealer-section {
    padding: 48px 0; border-top: 1px solid var(--warm);
    animation: fadeUp 0.6s ease both;
  }
  .dealer-section:first-of-type { border-top: none; }
  .dealer-head { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
  .dealer-logo { height: 48px; max-width: 160px; object-fit: contain; }
  .dealer-titles { flex: 1; }
  .dealer-name {
    font-family: var(--font-display); font-size: 28px; font-weight: 400; color: var(--ink);
  }
  .dealer-brand {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--gold); margin-top: 4px;
  }
  .dealer-body { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; align-items: start; }
  .dealer-video-wrap {
    position: relative; width: 100%; padding-top: 56.25%;
    background: var(--cream); border-radius: var(--radius); overflow: hidden;
  }
  .dealer-video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
  .dealer-text { font-size: 17px; line-height: 1.75; color: var(--ink); }
  @media (max-width: 760px) {
    .dealer-body { grid-template-columns: 1fr; }
  }

  /* FOOTER CTA */
  .footer-cta {
    margin-top: 64px; padding: 48px 40px; text-align: center;
    background: var(--cream); border-radius: var(--radius);
  }
  .footer-cta-title { font-family: var(--font-display); font-size: 28px; color: var(--card-text); margin-bottom: 20px; }

  /* SITE FOOTER (GDPR / legal) */
  .site-footer {
    margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--warm);
    display: flex; flex-wrap: wrap; gap: 8px 20px; align-items: center; justify-content: space-between;
  }
  .site-footer-text {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em;
    color: var(--muted);
  }
  .site-footer-links { display: flex; gap: 20px; }
  .site-footer-links a {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em;
    color: var(--muted); text-decoration: underline; text-underline-offset: 2px;
  }
  .site-footer-links a:hover { color: var(--gold); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    .page-wrap { padding: 48px 24px 80px; }
    .section-nav-wrap { margin: 0 -24px 40px; }
    .section-nav { padding: 12px 24px; }
  }
</style>
</head>
<body>

<div class="page-wrap">

  <div id="loadingScreen">
    <div class="spinner"></div>
    <div class="loading-label">Načítání…</div>
  </div>

  <div id="loadErrorScreen" style="display:none;">
    <div style="font-size:40px;">⚠️</div>
    <div class="load-error-message">Akci se nepodařilo načíst.</div>
  </div>

  <div class="site-logo-wrap" id="logoWrap">
    <img id="siteLogo" src="" alt="Logo">
  </div>

  <header class="hero" id="heroSection" style="display:none;">
    <div class="hero-eyebrow">O akci</div>
    <h1 class="hero-title" id="heroTitle"></h1>
    <div class="hero-meta" id="heroMeta"></div>
    <div class="hero-intro" id="heroIntro" style="display:none;"></div>
    <div class="hero-video-wrap" id="heroVideoWrap" style="display:none;">
      <iframe id="heroVideoFrame" allowfullscreen></iframe>
    </div>
    <div class="cta-row">
      <a class="btn btn-primary" id="ctaRegister" href="#">Registrovat se</a>
    </div>
  </header>

  <div class="section-nav-wrap" id="sectionNavWrap" style="display:none;">
    <nav class="section-nav" id="sectionNav"></nav>
  </div>

  <div id="sectionsContainer"></div>

  <div class="footer-cta" id="footerCta" style="display:none;">
    <div class="footer-cta-title">Chcete se zúčastnit?</div>
    <a class="btn btn-primary" id="ctaRegisterFooter" href="#">Registrovat se</a>
  </div>

  <footer class="site-footer">
    <div class="site-footer-text">© <span id="footerYear"></span> Autorion s.r.o.</div>
    <div class="site-footer-links">
      <a href="#" id="gdprFooterLink" target="_blank" rel="noopener noreferrer">Zásady ochrany osobních údajů</a>
    </div>
  </footer>

</div>

<script>
const API_BASE = 'https://autorion.net/api';

let EVENT_DATA = null;
let EVENT_SLUG = null;
let IS_PREVIEW = false;

// ── GDPR / privacy policy footer link ──
// Same dealer→URL mapping as registration.html, so both pages always agree.
const GDPR_URLS = {
  albion:  'https://www.albioncars.cz/zasady-zpracovani-a-ochrany-osobnich-udaju#cookies',
  cardion: 'https://www.volvista.cz/zasady-zpracovani-a-ochrany-osobnich-udaju',
  orbion:  'https://www.lynkac.cz/zasady-zpracovani-a-ochrany-osobnich-udaju',
};

function getDealerFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const d = (params.get('dealer') || '').toLowerCase();
  return ['albion', 'cardion', 'orbion'].includes(d) ? d : null;
}

function applyGdprFooterLink() {
  const dealer = getDealerFromUrl();
  const url = GDPR_URLS[dealer] || GDPR_URLS['albion'];
  const link = document.getElementById('gdprFooterLink');
  if (link) link.href = url;
}

function getEventSlugFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('event');
}

async function loadEventData() {
  const slug = getEventSlugFromUrl();
  EVENT_SLUG = slug;

  if (!slug) {
    showLoadError('Chybí parametr akce v adrese (?event=...).');
    return false;
  }

  const previewMatch = slug.match(/^__preview_(\d+)$/);
  const isPreview = !!previewMatch;
  const fetchUrl = isPreview
    ? `${API_BASE}/events/preview/${previewMatch[1]}`
    : `${API_BASE}/events/landing/${slug}`;

  try {
    const res = await fetch(fetchUrl);
    if (!res.ok) {
      showLoadError(res.status === 404
        ? 'Tato akce nebyla nalezena.'
        : 'Nepodařilo se načíst informace o akci. Zkuste to prosím později.');
      return false;
    }
    const event = await res.json();
    EVENT_DATA = event;
    IS_PREVIEW = isPreview;

    applyEventTheme(event.theme);
    renderPage(event);
    return true;
  } catch (e) {
    console.error(e);
    showLoadError('Nepodařilo se připojit k serveru.');
    return false;
  }
}

function showLoadError(message) {
  document.getElementById('loadingScreen').style.display = 'none';
  const errorScreen = document.getElementById('loadErrorScreen');
  errorScreen.style.display = 'flex';
  errorScreen.querySelector('.load-error-message').textContent = message;
}

function formatEventDateRange(from, to) {
  if (!from) return '';
  if (to && to !== from) return `${from} – ${to}`;
  return from;
}

function toEmbedUrl(url) {
  if (!url) return '';
  let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  if (m) return `https://www.youtube.com/embed/${m[1]}`;
  if (/^[a-zA-Z0-9_-]{11}$/.test(url.trim())) return `https://www.youtube.com/embed/${url.trim()}`;
  m = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if (m) return `https://player.vimeo.com/video/${m[1]}`;
  return url;
}

function renderPage(event) {
  document.getElementById('loadingScreen').style.display = 'none';

  const lp = event.landing_page || {};
  const hero = lp.hero || {};

  const theme = event.theme || {};
  const logo = theme.logo || {};
  if (logo.imageUrl) document.getElementById('siteLogo').src = logo.imageUrl;

  document.getElementById('heroSection').style.display = '';
  document.getElementById('heroTitle').textContent = hero.title || event.name || '';

  const metaEl = document.getElementById('heroMeta');
  metaEl.innerHTML = '';
  const dateStr = formatEventDateRange(event.date_from, event.date_to);
  if (dateStr) metaEl.innerHTML += `<div class="meta-item"><span class="meta-label">Datum</span><span class="meta-value">${dateStr}</span></div>`;
  if (event.location) metaEl.innerHTML += `<div class="meta-item"><span class="meta-label">Místo</span><span class="meta-value">${event.location}</span></div>`;

  const introEl = document.getElementById('heroIntro');
  if (hero.intro_text && hero.intro_text.trim()) {
    introEl.textContent = hero.intro_text;
    introEl.style.display = 'block';
  }

  const heroVideoWrap = document.getElementById('heroVideoWrap');
  if (hero.video_url && hero.video_url.trim()) {
    document.getElementById('heroVideoFrame').src = toEmbedUrl(hero.video_url);
    heroVideoWrap.style.display = 'block';
  }

  const regUrl = event.slug ? `https://registration.autorion.net?event=${event.slug}` : '#';
  document.getElementById('ctaRegister').href = regUrl;
  document.getElementById('ctaRegisterFooter').href = regUrl;

  const sections = lp.sections || [];
  const navWrap = document.getElementById('sectionNavWrap');
  const nav = document.getElementById('sectionNav');
  const container = document.getElementById('sectionsContainer');
  nav.innerHTML = '';
  container.innerHTML = '';

  if (sections.length > 1) {
    navWrap.style.display = 'block';
  }

  sections.forEach((s, i) => {
    const anchorId = `section-${s.id ?? i}`;

    if (sections.length > 1) {
      const navLink = document.createElement('a');
      navLink.className = 'section-nav-link';
      navLink.href = `#${anchorId}`;
      navLink.textContent = s.name || `Sekce ${i+1}`;
      nav.appendChild(navLink);
    }

    const sectionEl = document.createElement('section');
    sectionEl.className = 'dealer-section';
    sectionEl.id = anchorId;

    let headHtml = `<div class="dealer-head">`;
    if (s.logo_url) headHtml += `<img class="dealer-logo" src="${s.logo_url}" alt="${s.name||''}">`;
    headHtml += `<div class="dealer-titles">
      <div class="dealer-name">${s.name||''}</div>
      ${s.brand ? `<div class="dealer-brand">${s.brand}</div>` : ''}
    </div></div>`;

    let bodyHtml = `<div class="dealer-body">`;
    if (s.video_url && s.video_url.trim()) {
      bodyHtml += `<div class="dealer-video-wrap"><iframe src="${toEmbedUrl(s.video_url)}" allowfullscreen></iframe></div>`;
    } else {
      bodyHtml += `<div></div>`;
    }
    bodyHtml += `<div class="dealer-text">${(s.text||'').replace(/\n/g,'<br>')}</div>`;
    bodyHtml += `</div>`;

    sectionEl.innerHTML = headHtml + bodyHtml;
    container.appendChild(sectionEl);
  });

  if (sections.length) {
    document.getElementById('footerCta').style.display = 'block';
  }
}

function applyEventTheme(theme) {
  if (!theme || !Object.keys(theme).length) return;
  buildThemeCss(theme);
}

function hexToRgb(hex) {
  if (!hex || typeof hex !== 'string') return { r: 247, g: 244, b: 239 };
  const m = hex.replace('#','').match(/^([0-9a-f]{3}|[0-9a-f]{6})$/i);
  if (!m) return { r: 247, g: 244, b: 239 };
  let h = m[1];
  if (h.length === 3) h = h.split('').map(c => c+c).join('');
  return { r: parseInt(h.slice(0,2),16), g: parseInt(h.slice(2,4),16), b: parseInt(h.slice(4,6),16) };
}

function isLightColor(hex) {
  const { r, g, b } = hexToRgb(hex);
  return (0.299*r + 0.587*g + 0.114*b) > 140;
}

function deriveCardColor(hex) {
  const { r, g, b } = hexToRgb(hex);
  const light = isLightColor(hex);
  const amt = light ? -10 : 28;
  const clamp = v => Math.max(0, Math.min(255, v));
  return `rgb(${clamp(r+amt)}, ${clamp(g+amt)}, ${clamp(b+amt)})`;
}

function buildThemeCss(theme) {
  const styleEl = document.getElementById('themeStyle');
  if (!styleEl) return;

  const bg     = theme.bg || {};
  const colors = theme.colors || {};
  const typo   = theme.typography || {};
  const layout = theme.layout || {};
  const logo   = theme.logo || {};

  let bgValue = colors.surface || 'var(--paper)';
  if (bg.type === 'gradient') bgValue = `linear-gradient(${bg.gradAngle||135}deg, ${bg.grad1||'#fff'}, ${bg.grad2||'#eee'})`;
  if (bg.type === 'image' && bg.imageUrl) bgValue = `url(${bg.imageUrl})`;

  const pageBgColor = (bg.type === 'color' ? bg.color : null) || colors.surface || '#f7f4ef';
  const autoBg   = deriveCardColor(pageBgColor);
  const autoText = isLightColor(autoBg) ? '#1a1816' : '#f5f2ec';
  const cardBg   = colors.cardBg   || autoBg;
  const cardText = colors.cardText || autoText;
  const cardMuted = isLightColor(cardBg) ? '#6b6256' : '#b8b2a6';
  const btnBg    = colors.btn      || colors.primary || '#0e0d0b';
  const btnText  = colors.btnText  || '#ffffff';

  const css = `
    :root {
      --bg: ${bg.type === 'color' ? (bg.color||colors.surface||'#f7f4ef') : 'transparent'};
      --color-primary: ${colors.primary || '#0e0d0b'};
      --color-accent: ${colors.accent || '#b8924a'};
      --color-surface: ${colors.surface || '#f7f4ef'};
      --color-muted: ${colors.muted || '#8a8070'};
      --color-border: ${colors.border || '#d6cfc3'};
      --cream: ${cardBg};
      --warm: ${colors.border || '#d6cfc3'};
      --card-bg: ${cardBg};
      --card-text: ${cardText};
      --card-muted: ${cardMuted};
      --btn-bg: ${btnBg};
      --btn-text: ${btnText};
      --radius: ${layout.borderRadius != null ? layout.borderRadius+'px' : '2px'};
      --font-display: ${typo.fontDisplay || "'Cormorant Garamond', Georgia, serif"};
      --font-body: ${typo.fontBody || "'Cormorant Garamond', Georgia, serif"};
      --font-mono: ${typo.fontMono || "'Geist Mono', monospace"};
      --title-size: clamp(32px, 5vw, ${typo.titleSize || 72}px);
      --title-weight: ${typo.titleWeight || 300};
      --body-size: ${typo.bodySize || 18}px;
      --line-height: ${typo.lineHeight || 1.6};
      --page-padding: ${layout.pagePadding != null ? layout.pagePadding+'px' : '80px'} 40px 120px;
      --max-width: 960px;
      --noise-opacity: ${layout.noiseTexture === false ? 0 : 0.6};
      --noise-display: ${layout.noiseTexture === false ? 'none' : 'block'};
      --anim-header: ${layout.animations === false ? 'none' : `fadeUp ${layout.animSpeed||0.8}s ease both`};
      --logo-display: ${logo.visible && logo.imageUrl ? 'flex' : 'none'};
      --logo-height: ${logo.height || 40}px;
      --logo-position: ${logo.position || 'center'};
    }
    body { background: ${bg.type === 'image' ? `rgba(0,0,0,${bg.overlayOpacity!=null?bg.overlayOpacity:0.3}) ${bgValue} center/cover fixed` : bgValue}; }
  `;
  styleEl.textContent = css;

  const fontFamilies = [typo.fontDisplay, typo.fontBody, typo.fontMono]
    .filter(Boolean).map(f => f.match(/'([^']+)'/)?.[1]).filter(Boolean)
    .filter(f => !['Georgia','serif','sans-serif','monospace'].includes(f));
  const uniqueFonts = [...new Set(fontFamilies)];
  const gfontLink = document.getElementById('gfonts');
  if (gfontLink && uniqueFonts.length) {
    gfontLink.href = `https://fonts.googleapis.com/css2?${uniqueFonts.map(f=>`family=${f.replace(/ /g,'+')}:wght@300;400;600;700;800`).join('&')}&display=swap`;
  }
}

window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'autorion-landing-update') {
    if (e.data.theme) buildThemeCss(e.data.theme);
    if (e.data.event) renderPage(e.data.event);
  }
});

document.addEventListener('DOMContentLoaded', () => {
  const yearEl = document.getElementById('footerYear');
  if (yearEl) yearEl.textContent = new Date().getFullYear();
  applyGdprFooterLink();
  loadEventData();
});
</script>
</body>
</html>
